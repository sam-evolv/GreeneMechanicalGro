<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="gm-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8943F"/>
      <stop offset="30%" stop-color="#D4B15F"/>
      <stop offset="50%" stop-color="#F0D488"/>
      <stop offset="70%" stop-color="#D4B15F"/>
      <stop offset="100%" stop-color="#B8943F"/>
    </linearGradient>
    <linearGradient id="gm-gold-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5DFA0"/>
      <stop offset="35%" stop-color="#D4B15F"/>
      <stop offset="100%" stop-color="#A07C30"/>
    </linearGradient>
    <linearGradient id="gm-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8D08A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <path id="top-arc" d="M 52,200 A 148,148 0 0,1 348,200"/>
  </defs>

  <!-- Outer rings -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="url(#gm-ring)" stroke-width="3"/>
  <circle cx="200" cy="200" r="187" fill="none" stroke="url(#gm-ring)" stroke-width="1.5" opacity="0.5"/>

  <!-- Top arc text: Company name -->
  <text font-family="Poppins, Helvetica Neue, sans-serif" font-size="20" fill="url(#gm-gold)" letter-spacing="5" font-weight="600">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">GREENE MECHANICAL GROUP</textPath>
  </text>

  <!-- Side separator diamonds -->
  <polygon points="50,200 56,194 62,200 56,206" fill="url(#gm-gold)" opacity="0.6"/>
  <polygon points="338,200 344,194 350,200 344,206" fill="url(#gm-gold)" opacity="0.6"/>

  <!-- Inner decorative circle -->
  <circle cx="200" cy="220" r="115" fill="none" stroke="url(#gm-ring)" stroke-width="0.75" opacity="0.2"/>

  <!-- Bottom laurel - left sprig -->
  <g fill="url(#gm-gold)" opacity="0.4">
    <ellipse cx="160" cy="338" rx="5" ry="14" transform="rotate(32, 160, 338)"/>
    <ellipse cx="148" cy="352" rx="4.5" ry="12" transform="rotate(18, 148, 352)"/>
    <ellipse cx="142" cy="366" rx="4" ry="10" transform="rotate(2, 142, 366)"/>
    <ellipse cx="174" cy="326" rx="5" ry="13" transform="rotate(44, 174, 326)"/>
    <ellipse cx="186" cy="316" rx="4.5" ry="11" transform="rotate(54, 186, 316)"/>
  </g>
  <!-- Left stem -->
  <path d="M200,382 Q162,362 148,315" fill="none" stroke="url(#gm-gold)" stroke-width="1" opacity="0.3"/>

  <!-- Bottom laurel - right sprig (mirrored) -->
  <g fill="url(#gm-gold)" opacity="0.4">
    <ellipse cx="240" cy="338" rx="5" ry="14" transform="rotate(-32, 240, 338)"/>
    <ellipse cx="252" cy="352" rx="4.5" ry="12" transform="rotate(-18, 252, 352)"/>
    <ellipse cx="258" cy="366" rx="4" ry="10" transform="rotate(-2, 258, 366)"/>
    <ellipse cx="226" cy="326" rx="5" ry="13" transform="rotate(-44, 226, 326)"/>
    <ellipse cx="214" cy="316" rx="4.5" ry="11" transform="rotate(-54, 214, 316)"/>
  </g>
  <!-- Right stem -->
  <path d="M200,382 Q238,362 252,315" fill="none" stroke="url(#gm-gold)" stroke-width="1" opacity="0.3"/>

  <!-- Bottom center diamond -->
  <polygon points="200,388 196,382 200,376 204,382" fill="url(#gm-gold)" opacity="0.5"/>

  <!-- Central G letter -->
  <text x="200" y="262" text-anchor="middle" font-family="Georgia, Palatino Linotype, Book Antiqua, serif" font-size="170" font-weight="700" fill="url(#gm-gold-v)">G</text>
</svg>
